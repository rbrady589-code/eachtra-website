<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Settle — MaHalla × Eachtra</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0c0b09; --card:#141210; --cream:#EAE4D5;
      --muted:rgba(234,228,213,0.50); --faint:rgba(234,228,213,0.28); --line:rgba(234,228,213,0.12);
      --green:#2A9B6A;
      --font:-apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
    }
    body { background:var(--bg); color:var(--cream); font-family:var(--font); -webkit-font-smoothing:antialiased; min-height:100svh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { width:100%; max-width:440px; text-align:center; }
    .eyebrow { font-size:11px; letter-spacing:0.24em; text-transform:uppercase; color:var(--faint); margin-bottom:20px; }
    h1 { font-size:clamp(26px,5vw,36px); font-weight:300; letter-spacing:-0.03em; line-height:1.08; }
    .sub { margin-top:12px; font-size:15px; font-weight:300; line-height:1.6; color:var(--muted); }

    /* Currency toggle */
    .toggle-wrap { margin-top:36px; display:flex; justify-content:center; gap:1px; background:var(--line); border-radius:999px; padding:3px; }
    .toggle-btn { flex:1; padding:12px 20px; border:none; border-radius:999px; font-family:var(--font); font-size:13px; letter-spacing:0.04em; cursor:pointer; transition:all .2s; background:transparent; color:var(--muted); }
    .toggle-btn.active { background:var(--cream); color:#0c0b09; }

    .amount { margin-top:32px; font-size:clamp(40px,8vw,56px); font-weight:300; letter-spacing:-0.03em; }
    .amount-label { margin-top:6px; font-size:13px; color:var(--faint); letter-spacing:0.06em; }

    .pay-btn { display:block; margin-top:28px; padding:16px 24px; background:var(--cream); color:#0c0b09; border:none; border-radius:999px; font-family:var(--font); font-size:14px; letter-spacing:0.04em; cursor:pointer; text-decoration:none; transition:opacity .2s, transform .2s; }
    .pay-btn:hover { opacity:0.9; transform:translateY(-1px); }

    .foot { margin-top:40px; font-size:11px; letter-spacing:0.06em; color:var(--faint); }
  </style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">MaHalla × Eachtra</div>
    <h1>Settle the campaign.</h1>
    <p class="sub">Media-buying fee for the Sanctum of Sound campaign. Select your currency.</p>

    <div class="toggle-wrap" id="toggle">
      <button class="toggle-btn active" data-currency="eu">€ Euro</button>
      <button class="toggle-btn" data-currency="tw">NT$ Taiwan</button>
    </div>

    <div class="amount" id="amount">€500.00</div>
    <div class="amount-label" id="amount-label">European Union</div>

    <a class="pay-btn" id="pay-link" href="https://buy.stripe.com/5kQdRa0ED6dN9bpaHJ6Ri01" target="_blank">Pay €500 →</a>

    <div class="foot">Eachtra Agency · Berlin</div>
  </div>

  <script>
    const LINKS = {
      eu: "https://buy.stripe.com/5kQdRa0ED6dN9bpaHJ6Ri01",
      tw: "https://buy.stripe.com/5kQdRa0ED6dN9bpaHJ6Ri01"   // ← replace with TW Stripe link
    };
    const DISPLAY = {
      eu: { amount: "€500.00", label: "European Union", btn: "Pay €500 →" },
      tw: { amount: "NT$19,076.90", label: "Taiwan", btn: "Pay NT$19,076.90 →" }
    };

    const toggle = document.getElementById('toggle');
    const amount = document.getElementById('amount');
    const amountLabel = document.getElementById('amount-label');
    const payLink = document.getElementById('pay-link');

    toggle.addEventListener('click', (e) => {
      const btn = e.target.closest('.toggle-btn');
      if (!btn) return;
      const currency = btn.dataset.currency;
      toggle.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      amount.textContent = DISPLAY[currency].amount;
      amountLabel.textContent = DISPLAY[currency].label;
      payLink.textContent = DISPLAY[currency].btn;
      payLink.href = LINKS[currency];
    });

    // Stripe return redirect
    payLink.addEventListener('click', () => {
      localStorage.setItem('mh_payment_initiated', '1');
    });
    if (localStorage.getItem('mh_payment_initiated') === '1' && document.referrer.includes('stripe.com')) {
      localStorage.removeItem('mh_payment_initiated');
      window.location.replace('mahalla-next.html');
    }
  </script>
</body>
</html>
