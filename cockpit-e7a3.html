<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eachtra — Cockpit</title>
<meta name="robots" content="noindex, nofollow">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0c0b09;
    --panel:    #171512;
    --card:     #1e1b17;
    --card-2:   #221e19;
    --border:   rgba(234,228,213,0.10);
    --border-2: rgba(234,228,213,0.16);
    --crimson:  #C8352A;
    --green:    #2A9B6A;
    --amber:    #C89B3A;
    --cream:    #EAE4D5;
    --muted:    rgba(234,228,213,0.44);
    --dim:      rgba(234,228,213,0.20);
    --faint:    rgba(234,228,213,0.10);
    --font:     'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --serif:    Georgia, 'Times New Roman', serif;
  }

  html, body {
    width: 100%; min-height: 100%;
    background: var(--bg);
    color: var(--cream);
    font-family: var(--font);
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* subtle backdrop texture */
  body {
    background-image:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(234,228,213,0.05), transparent 60%),
      radial-gradient(ellipse 700px 500px at 100% 10%, rgba(42,155,106,0.04), transparent 60%);
    background-attachment: fixed;
  }

  /* ── Header ─────────────────────────────────────── */
  header.top {
    padding: 28px 24px 22px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 40;
    background: rgba(12,11,9,0.86);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
  }
  .top-inner { max-width: 1200px; margin: 0 auto; }
  .top-row {
    display: flex; align-items: baseline; justify-content: space-between; gap: 16px; flex-wrap: wrap;
  }
  .wordmark {
    font-size: 11px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase;
    color: rgba(234,228,213,0.9);
  }
  .wordmark span { color: var(--muted); font-weight: 400; text-transform: none; letter-spacing: 0; margin-left: 8px; font-family: var(--serif); font-style: italic; font-size: 13px; }
  .grade-pill {
    display: inline-flex; align-items: center; gap: 8px;
    border: 1px solid var(--border-2); border-radius: 999px;
    padding: 6px 14px 6px 10px;
  }
  .grade-badge {
    font-family: var(--serif); font-style: italic; font-size: 15px; color: var(--cream);
  }
  .grade-label { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); flex-shrink: 0; }

  .headline {
    margin-top: 18px;
    font-family: var(--serif); font-style: italic; font-weight: 400;
    font-size: clamp(20px, 3vw, 30px); line-height: 1.28; letter-spacing: -0.01em;
    color: var(--cream); max-width: 900px;
    word-break: break-word; overflow-wrap: break-word;
  }
  .headline em { font-style: normal; }
  .sub-row {
    margin-top: 10px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .sub-line { font-size: 11px; letter-spacing: 0.03em; color: var(--muted); }
  .poll-status { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--dim); display: flex; align-items: center; gap: 6px; }
  .poll-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--dim); transition: background .3s; }
  .poll-dot.pulse { background: var(--green); box-shadow: 0 0 6px var(--green); }

  /* ── Grid ───────────────────────────────────────── */
  main { max-width: 1200px; margin: 0 auto; padding: 24px; }
  .grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
  }
  @media (max-width: 980px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } main { padding: 16px; } header.top { padding: 20px 16px 18px; } }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    display: flex; flex-direction: column;
    min-height: 220px;
  }
  .card-head {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding-bottom: 14px; margin-bottom: 14px; border-bottom: 1px solid var(--border);
  }
  .card-title {
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--cream);
    display: flex; align-items: center; gap: 8px;
  }
  .card-icon { font-size: 13px; opacity: 0.85; }
  .card-count {
    font-size: 10px; color: var(--muted);
    border: 1px solid var(--faint); border-radius: 999px; padding: 2px 8px;
  }

  .feed { display: flex; flex-direction: column; gap: 12px; flex: 1; }
  .event {
    padding-left: 12px; border-left: 2px solid var(--faint); position: relative;
  }
  .event::before {
    content: ""; position: absolute; left: -4.5px; top: 4px;
    width: 7px; height: 7px; border-radius: 50%; background: var(--dim);
  }
  .event.dept-media_buying::before { background: var(--green); }
  .event.dept-finance::before { background: var(--amber); }
  .event.dept-client_delivery::before { background: #7A9BC8; }
  .event.dept-intel::before { background: #C88AC8; }
  .event.dept-sales::before { background: var(--crimson); }
  .event.dept-system::before { background: var(--muted); }
  .event-detail { font-size: 12.5px; line-height: 1.55; color: rgba(234,228,213,0.86); }
  .event-meta { margin-top: 4px; font-size: 10px; letter-spacing: 0.03em; color: var(--muted); display: flex; gap: 8px; }
  .event-client {
    font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted);
    border: 1px solid var(--faint); border-radius: 4px; padding: 1px 6px;
  }

  .empty-state {
    flex: 1; display: flex; align-items: center; justify-content: center;
    font-size: 11px; letter-spacing: 0.04em; color: var(--dim); font-style: italic; font-family: var(--serif);
    text-align: center; padding: 20px 10px;
  }

  /* ── Finance-specific ───────────────────────────── */
  .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .stat-box { background: var(--card-2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
  .stat-num { font-family: var(--serif); font-style: italic; font-size: 22px; color: var(--cream); line-height: 1; }
  .stat-num .eur { color: var(--muted); font-size: 0.7em; }
  .stat-label { margin-top: 6px; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }

  .deliv-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--faint); font-size: 12px; }
  .deliv-row:last-child { border-bottom: none; }
  .deliv-status { font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); }
  .deliv-count { font-family: var(--serif); font-style: italic; color: var(--cream); font-size: 15px; }

  /* ── Budget rows (Media Buying) ─────────────────── */
  .budget-row {
    background: var(--card-2); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; margin-bottom: 12px;
  }
  .budget-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .budget-client { font-size: 12px; letter-spacing: 0.02em; color: var(--cream); }
  .badge {
    font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600;
    border-radius: 999px; padding: 3px 9px;
  }
  .badge.frozen { color: #8FD3F4; background: rgba(143,211,244,0.10); border: 1px solid rgba(143,211,244,0.3); }
  .badge.active { color: var(--green); background: rgba(42,155,106,0.10); border: 1px solid rgba(42,155,106,0.3); }
  .badge.paused { color: var(--amber); background: rgba(200,155,58,0.10); border: 1px solid rgba(200,155,58,0.3); }
  .budget-bar-track { margin-top: 10px; height: 5px; border-radius: 999px; background: var(--faint); overflow: hidden; }
  .budget-bar-fill { height: 100%; background: var(--muted); border-radius: 999px; }
  .budget-nums { margin-top: 8px; display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); }
  .budget-note { margin-top: 8px; font-size: 10.5px; line-height: 1.5; color: var(--dim); }

  footer.bottom {
    max-width: 1200px; margin: 0 auto; padding: 20px 24px 40px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
    font-size: 10px; letter-spacing: 0.08em; color: var(--dim);
  }
  a.err-link { color: var(--crimson); }

  ::selection { background: rgba(234,228,213,0.2); }
</style>
</head>
<body>

<header class="top">
  <div class="top-inner">
    <div class="top-row">
      <div class="wordmark">Eachtra <span>Cockpit</span></div>
      <div class="grade-pill">
        <span class="live-dot"></span>
        <span class="grade-label">System grade</span>
        <span class="grade-badge">B−</span>
      </div>
    </div>
    <h1 class="headline" id="whatMoved">Loading what moved today&hellip;</h1>
    <div class="sub-row">
      <span class="sub-line" id="lastUpdated">Connecting to Supabase&hellip;</span>
      <span class="poll-status"><span class="poll-dot" id="pollDot"></span>polling · 30s</span>
    </div>
  </div>
</header>

<main>
  <div class="grid" id="cardGrid">
    <div class="card" data-dept="sales">
      <div class="card-head">
        <div class="card-title"><span class="card-icon">&#9737;</span>Sales</div>
        <div class="card-count" id="count-sales">&mdash;</div>
      </div>
      <div class="feed" id="feed-sales"></div>
    </div>

    <div class="card" data-dept="media_buying">
      <div class="card-head">
        <div class="card-title"><span class="card-icon">&#9673;</span>Media Buying</div>
        <div class="card-count" id="count-media_buying">&mdash;</div>
      </div>
      <div id="budgets"></div>
      <div class="feed" id="feed-media_buying"></div>
    </div>

    <div class="card" data-dept="creative">
      <div class="card-head">
        <div class="card-title"><span class="card-icon">&#9670;</span>Creative</div>
        <div class="card-count" id="count-creative">&mdash;</div>
      </div>
      <div class="feed" id="feed-creative"></div>
    </div>

    <div class="card" data-dept="client_delivery">
      <div class="card-head">
        <div class="card-title"><span class="card-icon">&#9679;</span>Client Delivery</div>
        <div class="card-count" id="count-client_delivery">&mdash;</div>
      </div>
      <div class="feed" id="feed-client_delivery"></div>
    </div>

    <div class="card" data-dept="finance">
      <div class="card-head">
        <div class="card-title"><span class="card-icon">&#8364;</span>Finance</div>
        <div class="card-count" id="count-finance">&mdash;</div>
      </div>
      <div class="stat-row" id="financeStats">
        <div class="stat-box"><div class="stat-num">&mdash;</div><div class="stat-label">Total received</div></div>
        <div class="stat-box"><div class="stat-num">&mdash;</div><div class="stat-label">Payments</div></div>
      </div>
      <div id="deliverablesSummary" style="margin-bottom:14px;"></div>
      <div class="feed" id="feed-finance"></div>
    </div>

    <div class="card" data-dept="intel">
      <div class="card-head">
        <div class="card-title"><span class="card-icon">&#9651;</span>Intel</div>
        <div class="card-count" id="count-intel">&mdash;</div>
      </div>
      <div class="feed" id="feed-intel"></div>
    </div>
  </div>
</main>

<footer class="bottom">
  <span>Eachtra &middot; unlisted cockpit &middot; not indexed</span>
  <span id="footStatus">&mdash;</span>
</footer>

<script>
(function () {
  var SUPABASE_URL = 'https://oowbdirzutyehjxonuug.supabase.co';
  var ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9vd2JkaXJ6dXR5ZWhqeG9udXVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzA0NjUsImV4cCI6MjA5MDAwNjQ2NX0.dQzJsfuJtOuqVKH0hKJbqRU3DT7gKfNbrsH5CZU2CvM';
  var POLL_MS = 30000;

  var DEPTS = ['sales', 'media_buying', 'creative', 'client_delivery', 'finance', 'intel'];
  var DEPT_LABEL = {
    sales: 'Sales', media_buying: 'Media Buying', creative: 'Creative',
    client_delivery: 'Client Delivery', finance: 'Finance', intel: 'Intel'
  };

  function headers() {
    return { 'apikey': ANON_KEY, 'Authorization': 'Bearer ' + ANON_KEY, 'Content-Type': 'application/json' };
  }

  function rest(path, opts) {
    opts = opts || {};
    return fetch(SUPABASE_URL + '/rest/v1/' + path, {
      method: opts.method || 'GET',
      headers: headers(),
      body: opts.body ? JSON.stringify(opts.body) : undefined
    }).then(function (r) {
      if (!r.ok) return r.text().then(function (t) { throw new Error(path + ' -> ' + r.status + ' ' + t); });
      return r.json();
    });
  }

  function esc(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  function timeAgo(iso) {
    var d = new Date(iso);
    var diffMs = Date.now() - d.getTime();
    var mins = Math.floor(diffMs / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    var hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    var days = Math.floor(hrs / 24);
    return days + 'd ago';
  }

  function eur(cents) {
    if (cents === null || cents === undefined) return '&mdash;';
    return '<span class="eur">&euro;</span>' + (cents / 100).toLocaleString('en-IE', { maximumFractionDigits: 0 });
  }

  function renderFeed(dept, events) {
    var el = document.getElementById('feed-' + dept);
    var countEl = document.getElementById('count-' + dept);
    if (!el) return;
    if (!events || events.length === 0) {
      el.innerHTML = '<div class="empty-state">no activity yet</div>';
      if (countEl) countEl.textContent = '0';
      return;
    }
    if (countEl) countEl.textContent = events.length;
    el.innerHTML = events.map(function (e) {
      var clientTag = e.client_ref ? '<span class="event-client">' + esc(e.client_ref) + '</span>' : '';
      return '' +
        '<div class="event dept-' + esc(dept) + '">' +
          '<div class="event-detail">' + esc(e.detail || e.action) + '</div>' +
          '<div class="event-meta"><span>' + timeAgo(e.ts) + '</span>' + clientTag + '</div>' +
        '</div>';
    }).join('');
  }

  function renderBudgets(rows) {
    var el = document.getElementById('budgets');
    if (!rows || rows.length === 0) { el.innerHTML = ''; return; }
    el.innerHTML = rows.map(function (b) {
      var pct = b.cap_cents > 0 ? Math.min(100, Math.round((b.spent_cents / b.cap_cents) * 100)) : 0;
      var badgeClass = b.status === 'frozen' ? 'frozen' : (b.status === 'active' ? 'active' : 'paused');
      return '' +
        '<div class="budget-row">' +
          '<div class="budget-top">' +
            '<span class="budget-client">' + esc(b.client_ref) + ' &middot; ' + esc(b.period) + '</span>' +
            '<span class="badge ' + badgeClass + '">' + esc(b.status) + '</span>' +
          '</div>' +
          '<div class="budget-bar-track"><div class="budget-bar-fill" style="width:' + pct + '%"></div></div>' +
          '<div class="budget-nums"><span>' + eur(b.spent_cents) + ' spent</span><span>cap ' + eur(b.cap_cents) + '</span></div>' +
          (b.note ? '<div class="budget-note">' + esc(b.note) + '</div>' : '') +
        '</div>';
    }).join('');
  }

  function renderFinance(summary, deliverables) {
    var statsEl = document.getElementById('financeStats');
    var s = (summary && summary[0]) || { total_cents: 0, payment_count: 0, last_payment_at: null };
    statsEl.innerHTML = '' +
      '<div class="stat-box"><div class="stat-num">' + eur(s.total_cents) + '</div><div class="stat-label">Total received &middot; ' + (s.last_payment_at ? timeAgo(s.last_payment_at) : 'no payments yet') + '</div></div>' +
      '<div class="stat-box"><div class="stat-num">' + (s.payment_count || 0) + '</div><div class="stat-label">Payments recorded</div></div>';

    var delivEl = document.getElementById('deliverablesSummary');
    if (!deliverables || deliverables.length === 0) {
      delivEl.innerHTML = '<div class="empty-state" style="min-height:auto;padding:10px 0;">no deliverables yet</div>';
    } else {
      delivEl.innerHTML = deliverables.map(function (d) {
        return '<div class="deliv-row"><span class="deliv-status">' + esc(d.status) + '</span><span class="deliv-count">' + d.count + '</span></div>';
      }).join('');
    }
  }

  function computeWhatMoved(allEvents) {
    var el = document.getElementById('whatMoved');
    if (!allEvents || allEvents.length === 0) {
      el.textContent = 'Quiet day — no events logged yet.';
      return;
    }
    var todayCount = allEvents.length;
    var latest = allEvents[0];
    var raw = latest.detail || latest.action;
    var truncated = raw.length > 90 ? raw.slice(0, 87) + '…' : raw;
    el.innerHTML = todayCount + ' moves logged &mdash; latest: <em>' + esc(truncated) + '</em>';
  }

  function pulse() {
    var dot = document.getElementById('pollDot');
    dot.classList.add('pulse');
    setTimeout(function () { dot.classList.remove('pulse'); }, 900);
  }

  function loadAll() {
    var footStatus = document.getElementById('footStatus');
    var lastUpdated = document.getElementById('lastUpdated');

    Promise.all([
      rest('activity_events?select=dept,actor,action,detail,client_ref,ts&order=ts.desc&limit=100'),
      rest('budgets?select=*&order=updated_at.desc'),
      rest('rpc/finance_summary', { method: 'POST', body: {} }),
      rest('rpc/deliverables_summary', { method: 'POST', body: {} })
    ]).then(function (results) {
      var events = results[0], budgets = results[1], finance = results[2], delivSummary = results[3];

      DEPTS.forEach(function (d) {
        renderFeed(d, events.filter(function (e) { return e.dept === d; }));
      });

      renderBudgets(budgets);
      renderFinance(finance, delivSummary);
      computeWhatMoved(events);

      pulse();
      var now = new Date();
      lastUpdated.textContent = 'Live · last updated ' + now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      footStatus.textContent = events.length + ' events · ' + budgets.length + ' budget line' + (budgets.length === 1 ? '' : 's') + ' · connected';
      footStatus.style.color = '';
    }).catch(function (err) {
      console.error('[cockpit] fetch error', err);
      lastUpdated.textContent = 'Connection error — check console';
      footStatus.innerHTML = '<span class="err-link">fetch failed: ' + esc(err.message) + '</span>';
    });
  }

  loadAll();
  setInterval(loadAll, POLL_MS);
})();
</script>
</body>
</html>
