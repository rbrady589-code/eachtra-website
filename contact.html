<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eachtra — Contact</title>
  <link rel="stylesheet" href="css/fonts.css">
  <link rel="stylesheet" href="css/shared.css">
  <style>
    body { overflow-y: auto; }

    .contact-grid {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 0 80px;
      padding: 56px 0;
      border-top: 1px solid rgba(234,228,213,0.07);
    }
    @media (max-width: 680px) {
      .contact-grid { grid-template-columns: 1fr; gap: 24px 0; }
    }

    .contact-label {
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(234,228,213,0.28);
      padding-top: 3px;
    }

    .page-header {
      padding: 48px 0 32px;
      border-bottom: 1px solid rgba(234,228,213,0.07);
    }
    .page-header-label {
      font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(234,228,213,0.22); margin-bottom: 12px;
    }
    .page-header-title {
      font-size: 28px; font-weight: 300; letter-spacing: -0.03em;
      color: rgba(234,228,213,0.88); line-height: 1.2;
    }

    /* ── Booking CTA (Cal.com popup) ──────────────── */
    .header-cta { margin-top: 22px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .book-cta {
      height: 40px; padding: 0 22px;
      display: inline-flex; align-items: center;
      background: #EAE4D5; color: #0c0b09;
      border: 1px solid #EAE4D5; border-radius: 999px;
      font-family: var(--font); font-size: 12px; letter-spacing: 0.04em; font-weight: 500;
      cursor: pointer; transition: opacity .2s, transform .2s;
    }
    .book-cta:hover { opacity: 0.88; transform: translateY(-1px); }
    .header-cta-hint { font-size: 11px; color: rgba(234,228,213,0.32); letter-spacing: 0.04em; }

    /* ── Form ─────────────────────────────────────── */
    .form { display: flex; flex-direction: column; gap: 20px; max-width: 480px; }

    .field { display: flex; flex-direction: column; gap: 7px; }

    .field label {
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(234,228,213,0.28);
    }

    .field input,
    .field select,
    .field textarea {
      background: rgba(234,228,213,0.04);
      border: 1px solid rgba(234,228,213,0.10);
      border-radius: 8px;
      padding: 11px 14px;
      font-family: var(--font);
      font-size: 13px;
      color: rgba(234,228,213,0.82);
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .field input::placeholder,
    .field textarea::placeholder { color: rgba(234,228,213,0.22); }
    .field input:focus,
    .field select:focus,
    .field textarea:focus { border-color: rgba(234,228,213,0.28); }

    .field select option { background: #1e1b17; color: rgba(234,228,213,0.82); }

    .field textarea { resize: vertical; min-height: 100px; }

    .form-submit {
      height: 38px;
      padding: 0 24px;
      background: rgba(234,228,213,0.07);
      border: 1px solid rgba(234,228,213,0.16);
      border-radius: 999px;
      font-family: var(--font);
      font-size: 11px;
      letter-spacing: 0.08em;
      color: rgba(234,228,213,0.75);
      cursor: pointer;
      align-self: flex-start;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .form-submit:hover {
      background: rgba(234,228,213,0.12);
      border-color: rgba(234,228,213,0.32);
      color: rgba(234,228,213,0.95);
    }

    #f-status {
      font-size: 11px;
      color: var(--green);
      display: none;
      letter-spacing: 0.06em;
    }
    #f-status.error { color: var(--crimson); }

    .direct-links {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .direct-link {
      font-size: 12px;
      color: rgba(234,228,213,0.45);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.18s;
    }
    .direct-link:hover { color: rgba(234,228,213,0.88); }
    .direct-link-label {
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(234,228,213,0.22);
      margin-bottom: 4px;
    }
  </style>
</head>
<body>

  <nav id="nav">
    <a class="nav-logo" href="/">Eachtra</a>
    <a class="nav-pill" href="work.html">Work</a>
    <div class="nav-divider"></div>
    <a class="nav-pill" href="about.html">About</a>
    <a class="nav-pill active" href="contact.html">Contact</a>
  </nav>

  <div class="page">
    <div class="page-inner">

      <div class="page-header">
        <div class="page-header-label">Contact</div>
        <div class="page-header-title">Ready to build something<br>that lasts.</div>
        <div class="header-cta">
          <button class="book-cta"
                  data-cal-namespace="15min"
                  data-cal-link="rory-brady-nijtym/15min"
                  data-cal-config='{"layout":"month_view"}'>Book a 15-min call &rarr;</button>
          <span class="header-cta-hint">or send a message below</span>
        </div>
      </div>

      <!-- Form -->
      <div class="contact-grid">
        <div class="contact-label">Get in touch</div>
        <form class="form" id="contactForm">
          <div class="field">
            <label for="f-name">Name</label>
            <input type="text" id="f-name" placeholder="Your name" required>
          </div>
          <div class="field">
            <label for="f-email">Email</label>
            <input type="email" id="f-email" placeholder="you@brand.com" required>
          </div>
          <div class="field">
            <label for="f-brand">Brand / project</label>
            <input type="text" id="f-brand" placeholder="What are you building?">
          </div>
          <div class="field">
            <label for="f-scope">Scope</label>
            <select id="f-scope">
              <option value="">Select one</option>
              <option>Paid Social</option>
              <option>Audience Build</option>
              <option>Creative Production</option>
              <option>Full System</option>
              <option>Not sure yet</option>
            </select>
          </div>
          <div class="field">
            <label for="f-message">Message</label>
            <textarea id="f-message" placeholder="Tell us about your brand and what you're trying to build."></textarea>
          </div>
          <button type="submit" class="form-submit" id="f-btn">Send it</button>
          <p id="f-status"></p>
        </form>
      </div>

      <!-- Direct -->
      <div class="contact-grid">
        <div class="contact-label">Direct</div>
        <div class="direct-links">
          <div>
            <div class="direct-link-label">Email</div>
            <a class="direct-link" href="mailto:hello@eachtraagency.com">hello@eachtraagency.com</a>
          </div>
          <div>
            <div class="direct-link-label">Based</div>
            <span class="direct-link">Berlin, Germany</span>
          </div>
        </div>
      </div>

    </div>
  </div>

  <footer id="footer">
    <span class="footer-copy">Eachtra Agency &copy; 2026</span>
    <span class="footer-copy">Berlin</span>
  </footer>

  <!-- Cal.com popup embed -->
  <script type="text/javascript">
    (function (C, A, L) { let p = function (a, ar) { a.q.push(ar); }; let d = C.document; C.Cal = C.Cal || function () { let cal = C.Cal; let ar = arguments; if (!cal.loaded) { cal.ns = {}; cal.q = cal.q || []; d.head.appendChild(d.createElement("script")).src = A; cal.loaded = true; } if (ar[0] === L) { const api = function () { p(api, arguments); }; const namespace = ar[1]; api.q = api.q || []; if (typeof namespace === "string") { cal.ns[namespace] = cal.ns[namespace] || api; p(cal.ns[namespace], ar); p(cal, ["initNamespace", namespace]); } else p(cal, ar); return; } p(cal, ar); }; })(window, "https://app.cal.com/embed/embed.js", "init");
    Cal("init", "15min", { origin: "https://app.cal.com" });
    Cal.ns["15min"]("ui", { hideEventTypeDetails: false, layout: "month_view" });
  </script>

  <!-- Contact form → Supabase capture + email notify -->
  <script>
    const SB_URL = 'https://oowbdirzutyehjxonuug.supabase.co';
    const SB_KEY = 'sb_publishable_iRsSxTe44otAgfom_AIKYQ_xfuxYKNj';

    document.getElementById('contactForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('f-btn');
      const status = document.getElementById('f-status');

      const payload = {
        name: document.getElementById('f-name').value.trim(),
        email: document.getElementById('f-email').value.trim(),
        brand: document.getElementById('f-brand').value.trim(),
        scope: document.getElementById('f-scope').value,
        message: document.getElementById('f-message').value.trim(),
      };

      btn.textContent = 'Sending...';
      btn.disabled = true;
      try {
        // 1. Durable capture in contact_leads
        fetch(`${SB_URL}/rest/v1/contact_leads`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`, Prefer: 'return=minimal' },
          body: JSON.stringify({
            name: payload.name,
            email: payload.email,
            message: `[${payload.scope || 'No scope'}] ${payload.brand ? payload.brand + ' — ' : ''}${payload.message}`,
            source: 'contact-page',
          }),
        }).catch(() => {});

        // 2. Email Rory (rbrady589@gmail.com) via edge function
        const res = await fetch(`${SB_URL}/functions/v1/contact-notify`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` },
          body: JSON.stringify(payload),
        });
        if (!res.ok) throw new Error();

        status.textContent = 'Sent. We will be in touch.';
        status.className = '';
        status.style.display = 'block';
        e.target.reset();
      } catch {
        status.textContent = 'Something went wrong. Email hello@eachtraagency.com directly.';
        status.className = 'error';
        status.style.display = 'block';
      }
      btn.textContent = 'Send it';
      btn.disabled = false;
    });
  </script>

</body>
</html>
