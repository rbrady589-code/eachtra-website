<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eachtra — Marketing Systems for Creative Businesses</title>
  <meta name="description" content="Eachtra builds marketing systems for music, events, and creative businesses. Berlin.">
  <meta property="og:title" content="Eachtra">
  <meta property="og:description" content="Marketing systems for creative businesses.">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://eachtraagency.com">
  <link rel="stylesheet" href="css/fonts.css">
  <link rel="stylesheet" href="css/shared.css">
  <style>
    html, body { overflow: hidden; }

    /* ── Full-screen video ─────────────────────────── */
    #video-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    #video-bg video {
      width: 100%; height: 100%;
      object-fit: cover;
      filter: contrast(1.14) saturate(1.6) brightness(1.1);
    }

    /* ── Nav override for landing (sits on bright video) ──── */
    #nav { background: none; }
    #nav .nav-logo {
      color: rgba(255,255,255,0.96);
      text-shadow: 0 1px 8px rgba(0,0,0,0.5);
    }
    #nav .nav-pill {
      color: rgba(255,255,255,0.92);
      border-color: rgba(255,255,255,0.55);
      background: rgba(12,11,9,0.28);
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
      text-shadow: 0 1px 6px rgba(0,0,0,0.4);
    }
    #nav .nav-pill:hover {
      border-color: rgba(255,255,255,0.85);
      background: rgba(12,11,9,0.42);
    }
    #nav .nav-pill.active {
      border-color: rgba(255,255,255,0.9);
      background: rgba(12,11,9,0.5);
      color: #fff;
    }

    /* ── Centered wordmark ─────────────────────────── */
    #wordmark {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    #wordmark img {
      width: clamp(150px, 22vw, 320px);
      opacity: 0.92;
      filter: brightness(0);
    }
  </style>
</head>
<body>

  <!-- Background video -->
  <div id="video-bg">
    <video src="images/painting-arete-animated.mp4" autoplay loop muted playsinline></video>
  </div>

  <!-- Nav -->
  <nav id="nav">
    <a class="nav-logo" href="/">Eachtra</a>
    <a class="nav-pill active" href="work.html">Work</a>
    <div class="nav-divider"></div>
    <a class="nav-pill" href="about.html">About</a>
    <a class="nav-pill" href="contact.html">Contact</a>
  </nav>

  <!-- Centered logo -->
  <div id="wordmark">
    <img src="images/eachtra-wordmark.png" alt="Eachtra">
  </div>

</body>
</html>
